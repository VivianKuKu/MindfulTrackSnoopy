<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft Warm Background Squircle -->
  <rect width="512" height="512" rx="128" fill="url(#bg_gradient)"/>
  
  <!-- Outer Glow -->
  <circle cx="256" cy="256" r="180" fill="white" fill-opacity="0.15"/>
  
  <!-- Main Heart Symbol -->
  <path d="M256 420C256 420 100 330 100 210C100 140 150 100 210 100C235 100 256 115 256 115C256 115 277 100 302 100C362 100 412 140 412 210C412 330 256 420 256 420Z" fill="white" fill-opacity="0.9"/>
  
  <!-- Inner Heart Detail (Soft Shade) -->
  <path d="M256 380C256 380 140 310 140 210C140 160 180 130 220 130C240 130 256 145 256 145C256 145 272 130 292 130C332 130 372 160 372 210C372 310 256 380 256 380Z" fill="url(#heart_gradient)" fill-opacity="0.2"/>

  <defs>
    <linearGradient id="bg_gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF9A9E"/> <!-- Soft Pink -->
      <stop offset="0.5" stop-color="#FAD0C4"/> <!-- Peach -->
      <stop offset="1" stop-color="#FFD1FF"/> <!-- Soft Lavender/Rose -->
